name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - master

jobs:
  python:
    name: Python Lint Build Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt
            requirements-dev.txt

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y libportaudio2

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -e .

      - name: Lint Python
        run: ruff check src tests scripts

      - name: Build Python package
        run: python -m build

      - name: Run Python tests
        run: pytest

  android:
    name: Android Lint Build Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses and install packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;34.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Lint test and build Android debug app
        working-directory: android-app
        run: ./gradlew --no-daemon --console=plain lintDebug testDebugUnitTest assembleDebug
