name: Master

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  python:
    name: Python Lint Build Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt
            requirements-dev.txt

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y libportaudio2

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -e .

      - name: Lint Python
        run: ruff check src tests scripts

      - name: Build Python package
        run: python -m build

      - name: Run Python tests
        run: pytest

  android:
    name: Android Lint Build Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses and install packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;34.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Lint test and build Android debug app
        working-directory: android-app
        run: ./gradlew --no-daemon --console=plain lintDebug testDebugUnitTest assembleDebug

  android-artifacts:
    name: Android APK Artifacts
    needs: android
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses and install packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;34.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug and release APKs
        working-directory: android-app
        run: ./gradlew --no-daemon --console=plain assembleDebug assembleRelease

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: android-app/app/build/outputs/apk/**/*.apk

  docker:
    name: Docker Build
    needs: python
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t jdi:${{ github.sha }} .

      - name: Export Docker image
        run: docker save jdi:${{ github.sha }} | gzip > jdi-docker-image.tar.gz

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: jdi-docker-image
          path: jdi-docker-image.tar.gz
